<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140a10"/>
      <stop offset="0.55" stop-color="#20101b"/>
      <stop offset="1" stop-color="#2b1024"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB7C5"/>
      <stop offset="0.5" stop-color="#FF6B9D"/>
      <stop offset="1" stop-color="#FFB7C5"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B9D" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF6B9D"/>
      <stop offset="1" stop-color="#FF6B9D" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="petal" d="M0,-7 C5,-4 5,5 0,8 C-5,5 -5,-4 0,-7 Z"/>
  </defs>
  <style>
    .petal { animation: fall linear infinite; }
    @keyframes fall {
      0%   { transform: translateY(-30px) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.85; }
      88%  { opacity: 0.7; }
      100% { transform: translateY(340px) rotate(300deg); opacity: 0; }
    }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
  </style>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <g transform="translate(60,0)"><use href="#petal"  class="petal" fill="#FF8FB3" opacity="0.8" style="animation-duration:8.5s; animation-delay:-1.2s"/></g>
  <g transform="translate(150,0)"><use href="#petal" class="petal" fill="#FFB7C5" opacity="0.6" style="animation-duration:11s;  animation-delay:-6s"/></g>
  <g transform="translate(240,0)"><use href="#petal" class="petal" fill="#FF6B9D" opacity="0.75" style="animation-duration:7.2s; animation-delay:-3.4s"/></g>
  <g transform="translate(330,0)"><use href="#petal" class="petal" fill="#f7c9d4" opacity="0.5" style="animation-duration:12.5s; animation-delay:-9s"/></g>
  <g transform="translate(415,0)"><use href="#petal" class="petal" fill="#FF8FB3" opacity="0.7" style="animation-duration:9.3s; animation-delay:-0.5s"/></g>
  <g transform="translate(500,0)"><use href="#petal" class="petal" fill="#FFB7C5" opacity="0.55" style="animation-duration:10.2s; animation-delay:-5.1s"/></g>
  <g transform="translate(590,0)"><use href="#petal" class="petal" fill="#FF6B9D" opacity="0.8" style="animation-duration:7.8s; animation-delay:-2.2s"/></g>
  <g transform="translate(675,0)"><use href="#petal" class="petal" fill="#f7c9d4" opacity="0.6" style="animation-duration:11.7s; animation-delay:-7.7s"/></g>
  <g transform="translate(760,0)"><use href="#petal" class="petal" fill="#FF8FB3" opacity="0.75" style="animation-duration:8.1s; animation-delay:-4.4s"/></g>
  <g transform="translate(845,0)"><use href="#petal" class="petal" fill="#FFB7C5" opacity="0.5" style="animation-duration:12s;  animation-delay:-10s"/></g>
  <g transform="translate(935,0)"><use href="#petal" class="petal" fill="#FF6B9D" opacity="0.7" style="animation-duration:7.5s; animation-delay:-1.8s"/></g>
  <g transform="translate(1020,0)"><use href="#petal" class="petal" fill="#f7c9d4" opacity="0.6" style="animation-duration:10.8s; animation-delay:-6.6s"/></g>
  <g transform="translate(1110,0)"><use href="#petal" class="petal" fill="#FF8FB3" opacity="0.8" style="animation-duration:8.9s; animation-delay:-3s"/></g>
  <g transform="translate(1160,0)"><use href="#petal" class="petal" fill="#FFB7C5" opacity="0.55" style="animation-duration:11.4s; animation-delay:-8.3s"/></g>

  <text x="600" y="152" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="100" font-weight="bold" fill="url(#txt)" filter="url(#glow)">ma2t</text>
  <rect class="cursor" x="740" y="80" width="11" height="72" fill="#FF6B9D"/>

  <rect x="300" y="192" width="600" height="2" fill="url(#line)"/>
  <text x="600" y="232" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="21" letter-spacing="10" fill="#dba7ba">SOFTWARE DEVELOPER</text>
</svg>
