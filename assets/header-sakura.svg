<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" font-family="'Courier New', Courier, monospace">
  <style>
    .cursor { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
    .petal { animation: drift linear infinite; }
    @keyframes drift {
      0%   { transform: translate(0, -15px) rotate(0deg); opacity: 0; }
      15%  { opacity: 0.5; }
      85%  { opacity: 0.4; }
      100% { transform: translate(-40px, 225px) rotate(140deg); opacity: 0; }
    }
  </style>

  <rect width="1200" height="210" fill="#150a10"/>

  <text x="70" y="118" font-size="68" font-weight="bold" fill="#FFB7C5">ma2t</text>
  <rect class="cursor" x="248" y="66" width="8" height="52" fill="#FF6B9D"/>

  <text x="72" y="160" font-size="19" fill="#8a6273">software developer</text>

  <g fill="#FF6B9D">
    <path class="petal" d="M980,0 c4,2 4,7 0,10 c-4,-3 -4,-8 0,-10 z" style="animation-duration:11s; animation-delay:-3s"/>
    <path class="petal" d="M1060,0 c4,2 4,7 0,10 c-4,-3 -4,-8 0,-10 z" style="animation-duration:14s; animation-delay:-9s" opacity="0.6"/>
    <path class="petal" d="M1130,0 c4,2 4,7 0,10 c-4,-3 -4,-8 0,-10 z" style="animation-duration:12.5s; animation-delay:-6s" opacity="0.8"/>
  </g>

  <rect x="0" y="206" width="1200" height="4" fill="#FF6B9D" opacity="0.35"/>
</svg>
