<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" font-family="'Courier New', Courier, monospace">
  <defs>
    <clipPath id="type">
      <rect x="90" y="160" width="0" height="30">
        <animate attributeName="width" values="0;0;260;260" keyTimes="0;0.2;0.6;1" dur="4.5s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  <style>
    .cursor { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
  </style>

  <rect width="1200" height="240" fill="#0b141d"/>

  <rect x="40" y="22" width="1120" height="196" rx="12" fill="#101c29" stroke="#22364a" stroke-width="1.5"/>

  <path d="M40,34 a12,12 0 0 1 12,-12 h1096 a12,12 0 0 1 12,12 v24 h-1120 z" fill="#182636"/>
  <text x="600" y="45" text-anchor="middle" font-size="14" fill="#8fa8bd">ma2t@dev: ~</text>
  <g stroke="#8fa8bd" stroke-width="1.6" fill="none">
    <line x1="1058" y1="44" x2="1070" y2="44"/>
    <rect x="1088" y="34" width="11" height="11"/>
    <line x1="1118" y1="34" x2="1129" y2="45"/>
    <line x1="1129" y1="34" x2="1118" y2="45"/>
  </g>

  <text x="90" y="92" font-size="16" fill="#6DBE45">ma2t@dev:~$ ./whoami</text>

  <text x="90" y="146" font-size="54" font-weight="bold" fill="#f0f4f8">ma<tspan fill="#F17D0A">2</tspan>t</text>
  <rect class="cursor" x="238" y="105" width="7" height="42" fill="#F17D0A"/>

  <text x="90" y="182" font-size="18" fill="#7d93a8" clip-path="url(#type)">&gt; software developer</text>

  <g font-size="15" opacity="0.4">
    <text x="720" y="112" fill="#57B6D9">while <tspan fill="#8fa8bd">(</tspan><tspan fill="#F17D0A">1</tspan><tspan fill="#8fa8bd">)</tspan></text>
    <text x="750" y="138" fill="#8fa8bd">code<tspan fill="#F17D0A">()</tspan>;</text>
    <text x="720" y="180" fill="#8fa8bd">sleep<tspan fill="#F17D0A">()</tspan>;</text>
  </g>

  <g>
    <rect x="52"  y="211" width="274" height="4" fill="#F17D0A"/>
    <rect x="326" y="211" width="274" height="4" fill="#6DBE45"/>
    <rect x="600" y="211" width="274" height="4" fill="#57B6D9"/>
    <rect x="874" y="211" width="274" height="4" fill="#D93B3B"/>
  </g>
</svg>
