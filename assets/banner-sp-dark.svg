<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" font-family="'Courier New', Courier, monospace">
  <defs>
    <clipPath id="type">
      <rect x="70" y="130" width="0" height="36">
        <animate attributeName="width" values="0;0;250;250" keyTimes="0;0.15;0.55;1" dur="4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  <style>
    .cursor { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
    .flake { animation: snowfall linear infinite; }
    @keyframes snowfall {
      0%   { transform: translate(0, -12px); opacity: 0; }
      12%  { opacity: 0.55; }
      85%  { opacity: 0.45; }
      100% { transform: translate(-35px, 225px); opacity: 0; }
    }
  </style>

  <rect width="1200" height="210" fill="#0e1a26"/>

  <text x="70" y="118" font-size="68" font-weight="bold" fill="#f0f4f8">ma2t</text>
  <rect class="cursor" x="248" y="66" width="8" height="52" fill="#F17D0A"/>

  <text x="72" y="160" font-size="19" fill="#7d93a8" clip-path="url(#type)">&gt; software developer</text>

  <g fill="#ffffff">
    <circle class="flake" cx="640"  cy="0" r="2.4" style="animation-duration:11s;  animation-delay:-6s"/>
    <circle class="flake" cx="740"  cy="0" r="1.8" style="animation-duration:13s;  animation-delay:-2s"/>
    <circle class="flake" cx="835"  cy="0" r="2.6" style="animation-duration:9.5s; animation-delay:-8s"/>
    <circle class="flake" cx="925"  cy="0" r="2"   style="animation-duration:12s;  animation-delay:-4s"/>
    <circle class="flake" cx="1010" cy="0" r="2.4" style="animation-duration:10s;  animation-delay:-9s"/>
    <circle class="flake" cx="1095" cy="0" r="1.8" style="animation-duration:14s;  animation-delay:-1s"/>
    <circle class="flake" cx="1165" cy="0" r="2.2" style="animation-duration:11.5s; animation-delay:-5s"/>
  </g>

  <g>
    <rect x="0"   y="206" width="300" height="4" fill="#F17D0A"/>
    <rect x="300" y="206" width="300" height="4" fill="#6DBE45"/>
    <rect x="600" y="206" width="300" height="4" fill="#57B6D9"/>
    <rect x="900" y="206" width="300" height="4" fill="#D93B3B"/>
  </g>
</svg>
