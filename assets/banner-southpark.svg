<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" font-family="'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif">
  <style>
    .flake { animation: snowfall linear infinite; }
    @keyframes snowfall {
      0%   { transform: translate(0, -12px); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.8; }
      100% { transform: translate(-30px, 252px); opacity: 0; }
    }
    .bus { animation: ride 15s linear infinite; }
    @keyframes ride {
      0%   { transform: translateX(-180px); }
      100% { transform: translateX(1380px); }
    }
    .cloud { animation: float 30s linear infinite alternate; }
    @keyframes float { 0% { transform: translateX(0); } 100% { transform: translateX(60px); } }
  </style>

  <rect width="1200" height="240" fill="#6fb7e6"/>

  <g class="cloud" fill="#ffffff" opacity="0.9">
    <ellipse cx="890" cy="45" rx="55" ry="20"/>
    <ellipse cx="930" cy="35" rx="40" ry="16"/>
  </g>
  <g class="cloud" fill="#ffffff" opacity="0.8" style="animation-delay:-15s">
    <ellipse cx="1080" cy="70" rx="45" ry="16"/>
    <ellipse cx="1110" cy="60" rx="32" ry="13"/>
  </g>

  <polygon points="640,190 810,55 980,190" fill="#7fa2b8"/>
  <polygon points="810,55 762,95 785,95 810,75 835,95 858,95" fill="#ffffff"/>
  <polygon points="820,190 1010,30 1200,190" fill="#5d7f95"/>
  <polygon points="1010,30 955,85 982,85 1010,58 1038,85 1065,85" fill="#ffffff"/>
  <polygon points="480,190 610,90 740,190" fill="#93b3c6"/>
  <polygon points="610,90 575,125 592,125 610,105 628,125 645,125" fill="#ffffff"/>

  <path d="M0,196 C150,182 280,204 430,192 C580,180 720,206 880,194 C1030,184 1120,202 1200,192 L1200,240 L0,240 Z" fill="#ffffff"/>

  <g class="flake" fill="#ffffff"><circle cx="120" cy="0" r="3"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:7s;  animation-delay:-2s"><circle cx="260" cy="0" r="2.4"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:9s;  animation-delay:-5s"><circle cx="400" cy="0" r="3"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:8s;  animation-delay:-1s"><circle cx="540" cy="0" r="2.2"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:10s; animation-delay:-6s"><circle cx="680" cy="0" r="2.8"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:7.5s; animation-delay:-3.5s"><circle cx="820" cy="0" r="2.3"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:9.5s; animation-delay:-7s"><circle cx="950" cy="0" r="3"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:8.5s; animation-delay:-4s"><circle cx="1090" cy="0" r="2.5"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:11s; animation-delay:-8s"><circle cx="1170" cy="0" r="2.2"/></g>
  <g class="flake" fill="#ffffff" style="animation-duration:8.2s; animation-delay:-0.5s"><circle cx="60" cy="0" r="2.6"/></g>

  <text x="70" y="118" font-size="72" font-weight="bold" fill="#e8502e" stroke="#ffffff" stroke-width="6" paint-order="stroke" stroke-linejoin="round">ma2t</text>
  <text x="74" y="158" font-size="22" font-weight="bold" fill="#1e3a4f">software developer</text>

  <g class="bus">
    <rect x="0" y="158" width="140" height="46" rx="8" fill="#F7C948" stroke="#c98f1b" stroke-width="2"/>
    <rect x="0" y="176" width="140" height="8" fill="#e8502e"/>
    <rect x="12"  y="166" width="24" height="16" rx="3" fill="#bfe6f5" stroke="#c98f1b" stroke-width="1.5"/>
    <rect x="46"  y="166" width="24" height="16" rx="3" fill="#bfe6f5" stroke="#c98f1b" stroke-width="1.5"/>
    <rect x="80"  y="166" width="24" height="16" rx="3" fill="#bfe6f5" stroke="#c98f1b" stroke-width="1.5"/>
    <rect x="114" y="166" width="20" height="16" rx="3" fill="#bfe6f5" stroke="#c98f1b" stroke-width="1.5"/>
    <circle cx="32"  cy="206" r="10" fill="#333333"/><circle cx="32"  cy="206" r="4" fill="#999999"/>
    <circle cx="108" cy="206" r="10" fill="#333333"/><circle cx="108" cy="206" r="4" fill="#999999"/>
  </g>
</svg>
