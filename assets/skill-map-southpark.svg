<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" font-family="'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif">
  <style>
    .flow { fill: none; stroke: #1e3a4f; stroke-width: 1.8; stroke-dasharray: 7 6; animation: dash 1.3s linear infinite; opacity: 0.6; }
    @keyframes dash { to { stroke-dashoffset: -13; } }
    .box { fill: #ffffff; stroke-width: 3; }
    .item { fill: #333333; font-size: 14px; }
    .dim { fill: #777777; font-size: 12px; font-style: italic; }
  </style>

  <rect width="1200" height="460" fill="#cfe8f5"/>

  <path class="flow" d="M600,102 C600,150 175,140 175,192"/>
  <path class="flow" d="M600,102 C600,150 458,145 458,192" style="animation-delay:-0.4s"/>
  <path class="flow" d="M600,102 C600,150 742,145 742,192" style="animation-delay:-0.8s"/>
  <path class="flow" d="M600,102 C600,150 1025,140 1025,192" style="animation-delay:-0.2s"/>

  <rect x="505" y="48" width="190" height="54" rx="12" fill="#ffffff" stroke="#e8502e" stroke-width="3"/>
  <text x="600" y="84" text-anchor="middle" font-size="30" font-weight="bold" fill="#e8502e">ma2t</text>

  <g>
    <rect class="box" x="60" y="192" width="230" height="176" rx="12" stroke="#F17D0A"/>
    <text x="175" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="#F17D0A">LOW-LEVEL</text>
    <line x1="85" y1="234" x2="265" y2="234" stroke="#F17D0A" stroke-width="1.5" opacity="0.5"/>
    <text class="item" x="175" y="262" text-anchor="middle">C / C++</text>
    <text class="item" x="175" y="288" text-anchor="middle">memory management</text>
    <text class="item" x="175" y="314" text-anchor="middle">multithreading</text>
    <text class="item" x="175" y="340" text-anchor="middle">algorithms &amp; data structures</text>
  </g>

  <g>
    <rect class="box" x="343" y="192" width="230" height="176" rx="12" stroke="#6DBE45"/>
    <text x="458" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="#4d9930">WEB</text>
    <line x1="368" y1="234" x2="548" y2="234" stroke="#6DBE45" stroke-width="1.5" opacity="0.5"/>
    <text class="item" x="458" y="262" text-anchor="middle">HTTP / REST APIs</text>
    <text class="item" x="458" y="288" text-anchor="middle">web server architecture</text>
    <text class="item" x="458" y="314" text-anchor="middle">sockets / TCP-IP</text>
    <text class="item" x="458" y="340" text-anchor="middle">JavaScript / HTML / CSS</text>
  </g>

  <g>
    <rect class="box" x="627" y="192" width="230" height="176" rx="12" stroke="#57B6D9"/>
    <text x="742" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="#2e8fb3">SYSTEMS &amp; DEVOPS</text>
    <line x1="652" y1="234" x2="832" y2="234" stroke="#57B6D9" stroke-width="1.5" opacity="0.5"/>
    <text class="item" x="742" y="262" text-anchor="middle">Linux administration</text>
    <text class="item" x="742" y="288" text-anchor="middle">Docker / containers</text>
    <text class="item" x="742" y="314" text-anchor="middle">Git / Makefile</text>
    <text class="item" x="742" y="340" text-anchor="middle">Bash scripting</text>
  </g>

  <g>
    <rect class="box" x="910" y="192" width="230" height="176" rx="12" stroke="#D93B3B"/>
    <text x="1025" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="#D93B3B">CLOUD &amp; SECURITY</text>
    <line x1="935" y1="234" x2="1115" y2="234" stroke="#D93B3B" stroke-width="1.5" opacity="0.5"/>
    <text class="item" x="1025" y="262" text-anchor="middle">AWS fundamentals</text>
    <text class="item" x="1025" y="288" text-anchor="middle">network security</text>
    <text class="item" x="1025" y="314" text-anchor="middle">TLS / subnetting</text>
    <text class="dim" x="1025" y="340" text-anchor="middle">certifications in progress</text>
  </g>

  <text x="600" y="425" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="4" fill="#1e3a4f" opacity="0.65">SKILL MAP</text>
</svg>
