<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" font-family="'Courier New', Courier, monospace">
  <defs>
    <clipPath id="type">
      <rect x="70" y="130" width="0" height="36">
        <animate attributeName="width" values="0;0;250;250" keyTimes="0;0.15;0.55;1" dur="4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  <style>
    .cursor { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
    .petal { animation: drift linear infinite; }
    @keyframes drift {
      0%   { transform: translate(0, -15px) rotate(0deg); opacity: 0; }
      12%  { opacity: 0.7; }
      85%  { opacity: 0.55; }
      100% { transform: translate(-55px, 225px) rotate(160deg); opacity: 0; }
    }
  </style>

  <rect width="1200" height="210" fill="#150a10"/>

  <text x="70" y="118" font-size="68" font-weight="bold" fill="#FFB7C5">ma2t</text>
  <rect class="cursor" x="248" y="66" width="8" height="52" fill="#FF6B9D"/>

  <text x="72" y="160" font-size="19" fill="#a87f92" clip-path="url(#type)">&gt; software developer</text>

  <g fill="#FF6B9D">
    <path class="petal" d="M620,0 c4,2 4,7 0,10 c-4,-3 -4,-8 0,-10 z" style="animation-duration:12s;  animation-delay:-7s"  opacity="0.55"/>
    <path class="petal" d="M730,0 c5,2 5,8 0,12 c-5,-4 -5,-10 0,-12 z" style="animation-duration:9.5s; animation-delay:-2s"  opacity="0.7"/>
    <path class="petal" d="M840,0 c4,2 4,7 0,10 c-4,-3 -4,-8 0,-10 z" style="animation-duration:13.5s; animation-delay:-10s" opacity="0.5"/>
    <path class="petal" d="M950,0 c5,2 5,8 0,12 c-5,-4 -5,-10 0,-12 z" style="animation-duration:10.5s; animation-delay:-4.5s" opacity="0.75"/>
    <path class="petal" d="M1050,0 c4,2 4,7 0,10 c-4,-3 -4,-8 0,-10 z" style="animation-duration:11.5s; animation-delay:-8.5s" opacity="0.6"/>
    <path class="petal" d="M1140,0 c5,2 5,8 0,12 c-5,-4 -5,-10 0,-12 z" style="animation-duration:9s;   animation-delay:-1s"  opacity="0.65"/>
  </g>

  <rect x="0" y="206" width="1200" height="4" fill="#FF6B9D" opacity="0.35"/>
</svg>
