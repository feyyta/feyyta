<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="1" stop-color="#0a0f0a"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dffa0"/>
      <stop offset="0.5" stop-color="#00FF41"/>
      <stop offset="1" stop-color="#7dffa0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .flow { fill: none; stroke: #00FF41; stroke-width: 1.6; stroke-dasharray: 7 6; animation: dash 1.3s linear infinite; opacity: 0.75; }
    @keyframes dash { to { stroke-dashoffset: -13; } }
    .box { fill: #050d07; stroke: #00FF41; stroke-width: 1.4; rx: 10; }
    .title { fill: #7dffa0; font-size: 17px; font-weight: bold; letter-spacing: 2px; }
    .item { fill: #9fd8ae; font-size: 14px; }
    .dim { fill: #4e7a5c; font-size: 12px; font-style: italic; }
  </style>

  <rect width="1200" height="460" fill="url(#bg)"/>

  <path class="flow" d="M600,102 C600,150 175,140 175,192"/>
  <path class="flow" d="M600,102 C600,150 458,145 458,192" style="animation-delay:-0.4s"/>
  <path class="flow" d="M600,102 C600,150 742,145 742,192" style="animation-delay:-0.8s"/>
  <path class="flow" d="M600,102 C600,150 1025,140 1025,192" style="animation-delay:-0.2s"/>

  <rect x="505" y="48" width="190" height="54" rx="12" fill="#050d07" stroke="url(#txt)" stroke-width="2" filter="url(#glow)"/>
  <text x="600" y="83" text-anchor="middle" font-size="30" font-weight="bold" fill="url(#txt)">ma2t</text>

  <g>
    <rect class="box" x="60" y="192" width="230" height="176" rx="10"/>
    <text class="title" x="175" y="222" text-anchor="middle">LOW-LEVEL</text>
    <line x1="85" y1="234" x2="265" y2="234" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
    <text class="item" x="175" y="262" text-anchor="middle">C / C++</text>
    <text class="item" x="175" y="288" text-anchor="middle">memory management</text>
    <text class="item" x="175" y="314" text-anchor="middle">multithreading</text>
    <text class="item" x="175" y="340" text-anchor="middle">algorithms &amp; data structures</text>
  </g>

  <g>
    <rect class="box" x="343" y="192" width="230" height="176" rx="10"/>
    <text class="title" x="458" y="222" text-anchor="middle">WEB</text>
    <line x1="368" y1="234" x2="548" y2="234" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
    <text class="item" x="458" y="262" text-anchor="middle">HTTP / REST APIs</text>
    <text class="item" x="458" y="288" text-anchor="middle">web server architecture</text>
    <text class="item" x="458" y="314" text-anchor="middle">sockets / TCP-IP</text>
    <text class="item" x="458" y="340" text-anchor="middle">JavaScript / HTML / CSS</text>
  </g>

  <g>
    <rect class="box" x="627" y="192" width="230" height="176" rx="10"/>
    <text class="title" x="742" y="222" text-anchor="middle">SYSTEMS &amp; DEVOPS</text>
    <line x1="652" y1="234" x2="832" y2="234" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
    <text class="item" x="742" y="262" text-anchor="middle">Linux administration</text>
    <text class="item" x="742" y="288" text-anchor="middle">Docker / containers</text>
    <text class="item" x="742" y="314" text-anchor="middle">Git / Makefile</text>
    <text class="item" x="742" y="340" text-anchor="middle">Bash scripting</text>
  </g>

  <g>
    <rect class="box" x="910" y="192" width="230" height="176" rx="10"/>
    <text class="title" x="1025" y="222" text-anchor="middle">CLOUD &amp; SECURITY</text>
    <line x1="935" y1="234" x2="1115" y2="234" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
    <text class="item" x="1025" y="262" text-anchor="middle">AWS fundamentals</text>
    <text class="item" x="1025" y="288" text-anchor="middle">network security</text>
    <text class="item" x="1025" y="314" text-anchor="middle">TLS / subnetting</text>
    <text class="dim" x="1025" y="340" text-anchor="middle">certifications in progress</text>
  </g>

  <text x="600" y="425" text-anchor="middle" font-size="13" letter-spacing="6" fill="#4e7a5c">SKILL MAP</text>
</svg>
