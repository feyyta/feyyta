<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="fadecol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00FF41" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#00FF41" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00FF41" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00FF41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00FF41"/>
      <stop offset="1" stop-color="#00FF41" stop-opacity="0"/>
    </linearGradient>
    <filter id="gglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .col { animation: rain linear infinite; font-family: 'Courier New', Courier, monospace; font-size: 17px; }
    @keyframes rain {
      0%   { transform: translateY(-320px); }
      100% { transform: translateY(320px); }
    }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
  </style>

